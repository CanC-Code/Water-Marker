name: Water Marker Build Engine

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push to a new branch

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required to fetch all branches for git operations

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python 3.x
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install and Configure ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick
          sudo sed -i 's/domain="coder" rights="none" pattern="PDF"/domain="coder" rights="read|write" pattern="PDF"/' /etc/ImageMagick-6/policy.xml
          sudo sed -i 's/domain="coder" rights="none" pattern="LABEL"/domain="coder" rights="read|write" pattern="LABEL"/' /etc/ImageMagick-6/policy.xml

      - name: Run Orchestration Scripts
        run: |
          mkdir -p scripts
          shopt -s nullglob
          for script in scripts/[0-9]*.py; do
            echo "::group::Executing $script"
            python3 "$script"
            echo "::endgroup::"
          done
          shopt -u nullglob

      - name: Commit to WM-debug Branch
        run: |
          # Configure git identity
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Create and checkout the new branch
          git checkout -B WM-debug
          
          # Stage all changes (including new assets generated by scripts)
          git add .
          
          # Check if there are changes to commit
          if git diff-index --quiet HEAD --; then
            echo "No changes to commit."
          else
            git commit -m "Automated commit: Updated files for compilation [skip ci]"
            git push origin WM-debug --force
          fi
